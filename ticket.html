<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGY_MONUMENTS / Ticket booking</title>
      <link rel="stylesheet" href="ticket.css"/>
</head>
<body>
     <fieldset>
        <legend><b>TICKET BOOKING</b></legend>
     <form>
        <div>
            <div>
            <label for="txt">name</label>
            <input id="txt" type="text" placeholder=" your name" required /></div>

            <div>
             <label for="email">email</label>
             <input id="email" type="email" placeholder="email" required/> 
            </div>

            <div>
             <label for="mobile">mobile phone</label>
             <input id="mobile" type="tel" placeholder="telphone" required>
            </div>

            <div>
             <label for="num_tic">tickets number</label>
             <input id="num_tic" type="number" min="1" placeholder="number of tickets" required/>
            </div>

            <div>
              <button type="submit" class="pharaonic-btn oval-btn">Submit</button>
            </div>
       </div>
     </form>
    </fieldset>
        <footer>
        <p style="text-align: center; border: none; background: transparent;">&copy; 2026 Ticket Booking - A Journey into the Heart of History</p>
    </footer>
    <script src="java.js"></script>
   
</body>
</html>
